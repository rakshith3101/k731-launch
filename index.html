<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K731 - Edge AI Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #grid-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

        .company-name {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
        }

        .email {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 1rem;
            letter-spacing: 0.2rem;
        }

        .email a {
            color: #FFFFFF;
            text-decoration: none;
            border-bottom: 1px solid #FFFFFF;
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .email a:hover {
            border-bottom-color: transparent;
        }

        @media (max-width: 768px) {
            .company-name {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            .tagline {
                font-size: 0.9rem;
                letter-spacing: 0.2rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="grid-canvas"></canvas>
    
    <div class="content">
        <h1 class="company-name">K731</h1>
        <p class="tagline">Edge AI Solutions</p>
    </div>

    <div class="email">
        <a href="mailto:contact@k731.ai">contact@k731.ai</a>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gridSize = 30;
        let time = 0;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Flowing space-time fabric effect
        let offsetX = 0;
        let offsetY = 0;
        let flowPhase = 0;

        function drawFlowingGrid() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // Subtle space-time fabric
            ctx.globalAlpha = 0.25;
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 0.8;

            // Calculate flowing offsets - moves in various directions
            flowPhase += 0.008;
            
            // Primary flow: right to left with wave motion
            offsetX = (time * 20) % (gridSize * 2);
            
            // Secondary flow: up and down wave
            offsetY = Math.sin(flowPhase) * 30 + Math.cos(flowPhase * 0.7) * 20;
            
            // Additional random drift
            const driftX = Math.sin(flowPhase * 1.3) * 15;
            const driftY = Math.cos(flowPhase * 0.9) * 25;

            const totalOffsetX = offsetX + driftX;
            const totalOffsetY = offsetY + driftY;

            // Draw vertical lines flowing across screen
            for (let x = -gridSize; x <= width + gridSize; x += gridSize) {
                const waveY = Math.sin((x + time * 30) * 0.01) * 10;
                const waveX = Math.cos((x + time * 20) * 0.015) * 5;
                
                ctx.beginPath();
                for (let y = 0; y <= height; y += 8) {
                    const distortY = Math.sin(y * 0.02 + time * 2) * 3;
                    const finalX = x - totalOffsetX + waveX + distortY;
                    const finalY = y + waveY + totalOffsetY * 0.3;
                    
                    if (y === 0) {
                        ctx.moveTo(finalX, finalY);
                    } else {
                        ctx.lineTo(finalX, finalY);
                    }
                }
                ctx.stroke();
            }

            // Draw horizontal lines with wave motion
            for (let y = -gridSize; y <= height + gridSize; y += gridSize) {
                const waveX = Math.cos((y + time * 25) * 0.012) * 8;
                
                ctx.beginPath();
                for (let x = 0; x <= width; x += 8) {
                    const distortX = Math.cos(x * 0.02 + time * 1.5) * 4;
                    const finalX = x + waveX + distortX;
                    const finalY = y + totalOffsetY + Math.sin(x * 0.01) * 2;
                    
                    if (x === 0) {
                        ctx.moveTo(finalX, finalY);
                    } else {
                        ctx.lineTo(finalX, finalY);
                    }
                }
                ctx.stroke();
            }

            // Draw small grid nodes (dots)
            const nodeSize = 2;
            for (let x = 0; x <= width; x += gridSize) {
                for (let y = 0; y <= height; y += gridSize) {
                    const waveX = Math.cos((y + time * 25) * 0.012) * 8;
                    const waveY = Math.sin((x + time * 30) * 0.01) * 10;
                    
                    const finalX = x - totalOffsetX + waveX;
                    const finalY = y + totalOffsetY + waveY;
                    
                    // Only draw if within bounds
                    if (finalX > -5 && finalX < width + 5 && finalY > -5 && finalY < height + 5) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.globalAlpha = 0.05 + Math.sin(time * 2 + x * 0.1 + y * 0.1) * 0.03;
                        ctx.beginPath();
                        ctx.arc(finalX, finalY, nodeSize / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            ctx.globalAlpha = 1;
        }

        // Animation loop
        function animate() {
            time += 0.02;
            drawFlowingGrid();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
