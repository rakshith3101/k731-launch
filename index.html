<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K731 - Edge AI Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #grid-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

        .company-name {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
        }

        .email {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 1rem;
            letter-spacing: 0.2rem;
        }

        .email a {
            color: #FFFFFF;
            text-decoration: none;
            border-bottom: 1px solid #FFFFFF;
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .email a:hover {
            border-bottom-color: transparent;
        }

        @media (max-width: 768px) {
            .company-name {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            .tagline {
                font-size: 0.9rem;
                letter-spacing: 0.2rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="grid-canvas"></canvas>
    
    <div class="content">
        <h1 class="company-name">K731</h1>
        <p class="tagline">Edge AI Solutions</p>
    </div>

    <div class="email">
        <a href="mailto:k.731.aitech@gmail.com">k.731.aitech@gmail.com</a>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gridSize = 30;
        let time = 0;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Droplet ripple effect - like water drops creating expanding waves
        let ripples = [];
        let nextRippleTime = 0;

        function createRipple() {
            // Random position on screen
            const padding = 100;
            const x = padding + Math.random() * (width - 2 * padding);
            const y = padding + Math.random() * (height - 2 * padding);
            
            ripples.push({
                x: x,
                y: y,
                radius: 0,
                maxRadius: 250 + Math.random() * 150,
                intensity: 1,
                speed: 1.5 + Math.random() * 1
            });
        }

        function drawRippleGrid() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // Very subtle grid
            ctx.globalAlpha = 0.12;
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 0.8;

            // Draw static base grid with ripple distortions
            for (let x = 0; x <= width; x += gridSize) {
                ctx.beginPath();
                for (let y = 0; y <= height; y += 5) {
                    let distortX = 0;
                    let distortY = 0;

                    // Apply ripple distortions
                    for (let ripple of ripples) {
                        const dist = Math.sqrt((x - ripple.x) ** 2 + (y - ripple.y) ** 2);
                        const rippleWidth = 40;
                        
                        if (Math.abs(dist - ripple.radius) < rippleWidth) {
                            const strength = (1 - Math.abs(dist - ripple.radius) / rippleWidth) * ripple.intensity;
                            const angle = Math.atan2(y - ripple.y, x - ripple.x);
                            distortX += Math.cos(angle) * strength * 15;
                            distortY += Math.sin(angle) * strength * 15;
                        }
                    }

                    if (y === 0) {
                        ctx.moveTo(x + distortX, y + distortY);
                    } else {
                        ctx.lineTo(x + distortX, y + distortY);
                    }
                }
                ctx.stroke();
            }

            // Draw horizontal lines
            for (let y = 0; y <= height; y += gridSize) {
                ctx.beginPath();
                for (let x = 0; x <= width; x += 5) {
                    let distortX = 0;
                    let distortY = 0;

                    for (let ripple of ripples) {
                        const dist = Math.sqrt((x - ripple.x) ** 2 + (y - ripple.y) ** 2);
                        const rippleWidth = 40;
                        
                        if (Math.abs(dist - ripple.radius) < rippleWidth) {
                            const strength = (1 - Math.abs(dist - ripple.radius) / rippleWidth) * ripple.intensity;
                            const angle = Math.atan2(y - ripple.y, x - ripple.x);
                            distortX += Math.cos(angle) * strength * 15;
                            distortY += Math.sin(angle) * strength * 15;
                        }
                    }

                    if (x === 0) {
                        ctx.moveTo(x + distortX, y + distortY);
                    } else {
                        ctx.lineTo(x + distortX, y + distortY);
                    }
                }
                ctx.stroke();
            }

            // Draw grid nodes at intersections
            for (let x = 0; x <= width; x += gridSize) {
                for (let y = 0; y <= height; y += gridSize) {
                    let distortX = 0;
                    let distortY = 0;

                    for (let ripple of ripples) {
                        const dist = Math.sqrt((x - ripple.x) ** 2 + (y - ripple.y) ** 2);
                        const rippleWidth = 40;
                        
                        if (Math.abs(dist - ripple.radius) < rippleWidth) {
                            const strength = (1 - Math.abs(dist - ripple.radius) / rippleWidth) * ripple.intensity;
                            const angle = Math.atan2(y - ripple.y, x - ripple.x);
                            distortX += Math.cos(angle) * strength * 15;
                            distortY += Math.sin(angle) * strength * 15;
                        }
                    }

                    ctx.fillStyle = '#FFFFFF';
                    ctx.globalAlpha = 0.15;
                    ctx.beginPath();
                    ctx.arc(x + distortX, y + distortY, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.globalAlpha = 1;

            // Update ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].radius += ripples[i].speed;
                ripples[i].intensity *= 0.985; // Fade out
                
                if (ripples[i].intensity < 0.05 || ripples[i].radius > ripples[i].maxRadius) {
                    ripples.splice(i, 1);
                }
            }

            // Create new ripple occasionally
            if (time > nextRippleTime) {
                createRipple();
                nextRippleTime = time + 2 + Math.random() * 3; // Every 2-5 seconds
            }
        }

        // Animation loop
        function animate() {
            time += 0.02;
            drawRippleGrid();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
